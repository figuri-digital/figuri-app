<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho – Figuri</title>
  <link rel="icon" type="image/svg+xml" href="/fav.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0d1a00;
      color: #edfbd9;
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* Navbar */
    .navbar {
      background: rgba(26,43,1,0.97);
      border-bottom: 1px solid rgba(148,221,45,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 62px; position: sticky; top: 0; z-index: 100;
    }
    .navbar-logo img { height: 40px; }
    .nav-back {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: #ccc; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-family: 'Sora', sans-serif; font-size: 13px;
      transition: all .18s;
    }
    .nav-back:hover { border-color: #94DD2D; color: #94DD2D; }

    /* Layout */
    .container { max-width: 760px; margin: 0 auto; padding: 32px 20px; }

    h1 { font-size: 1.6rem; font-weight: 800; color: #94DD2D; margin-bottom: 6px; }
    .cart-subtitle { font-size: 0.85rem; color: #7a9f3e; margin-bottom: 28px; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: #5a7a2e;
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1rem; margin-bottom: 24px; }
    .btn-outline {
      background: transparent; border: 1.5px solid #94DD2D;
      color: #94DD2D; padding: 12px 28px; border-radius: 10px;
      cursor: pointer; font-family: 'Sora', sans-serif;
      font-size: 0.9rem; font-weight: 700; transition: all .18s;
    }
    .btn-outline:hover { background: rgba(148,221,45,0.1); }

    /* Cart item */
    .cart-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
    .cart-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148,221,45,0.12);
      border-radius: 14px;
      padding: 16px;
      display: flex; gap: 14px; align-items: center;
    }
    .item-thumb {
      width: 72px; height: 96px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a2b01;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-product { font-size: 0.78rem; color: #94DD2D; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .item-name { font-size: 1rem; font-weight: 700; margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-details { font-size: 0.75rem; color: #7a9f3e; }
    .item-price { font-size: 1.1rem; font-weight: 800; color: #FFC300; flex-shrink: 0; }
    .item-remove {
      background: none; border: none; color: #666; font-size: 18px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: all .15s; flex-shrink: 0;
    }
    .item-remove:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

    /* Summary */
    .cart-summary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148,221,45,0.15);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.88rem; color: #aaa; padding: 5px 0;
    }
    .summary-row.total {
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 10px; padding-top: 14px;
      font-size: 1.2rem; font-weight: 800; color: #edfbd9;
    }
    .summary-row.total span:last-child { color: #FFC300; }

    .btn-add-more {
      width: 100%; padding: 13px;
      background: transparent; border: 1.5px dashed rgba(148,221,45,0.35);
      color: #94DD2D; border-radius: 10px;
      cursor: pointer; font-family: 'Sora', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      transition: all .18s; margin-bottom: 12px;
    }
    .btn-add-more:hover { background: rgba(148,221,45,0.07); border-color: #94DD2D; }

    .btn-checkout {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #94DD2D, #6ab520);
      border: none; border-radius: 12px;
      color: #1a2b01; font-family: 'Sora', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all .2s;
    }
    .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(148,221,45,0.35); }
    .btn-checkout:disabled { opacity: 0.6; cursor: default; transform: none; box-shadow: none; }

    /* ── MODAL PIX ── */
    .pix-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .pix-overlay.open { display: flex; }
    .pix-modal {
      background: #111;
      border: 1px solid #2a5a00;
      border-radius: 18px; padding: 32px 26px;
      max-width: 420px; width: 94vw;
      text-align: center; position: relative;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
    .pix-modal .close-btn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: #888; font-size: 22px; cursor: pointer;
    }
    .pix-modal .close-btn:hover { color: #fff; }
    .pix-modal h2 { font-size: 1.3rem; color: #94DD2D; margin-bottom: 4px; }
    .pix-amount { font-size: 2rem; font-weight: 800; color: #FFC300; margin: 8px 0 18px; }
    .pix-label { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
    .pix-qr-wrap {
      background: #fff; border-radius: 12px; padding: 10px;
      width: 180px; height: 180px; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .pix-qr-wrap img { width: 160px; height: 160px; display: block; }
    .pix-code-wrap {
      background: #1a2b01; border: 1px solid #2e4a05;
      border-radius: 10px; padding: 12px 14px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .pix-code-wrap code {
      font-size: 0.62rem; color: #94DD2D; word-break: break-all;
      flex: 1; text-align: left; font-family: monospace; line-height: 1.4;
    }
    .pix-copy-btn {
      flex-shrink: 0; background: #94DD2D; color: #1a2b01;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-weight: 700; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }
    .pix-copy-btn.copied { background: #FFC300; }
    .pix-copy-btn:hover { background: #a8f033; }
    .pix-status {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.85rem; color: #aaa; margin-bottom: 8px;
    }
    .pix-status .dot { width: 10px; height: 10px; border-radius: 50%; background: #FFC300; animation: pulse 1.2s infinite; }
    .pix-status.approved .dot { background: #94DD2D; animation: none; }
    .pix-status.approved { color: #94DD2D; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pix-timer { font-size: 0.75rem; color: #666; margin-top: 4px; }
    .pix-success-msg {
      display: none; padding: 14px; margin-top: 12px;
      background: rgba(148,221,45,0.12); border: 1px solid #94DD2D;
      border-radius: 12px; color: #94DD2D; font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/gerar.html" class="navbar-logo"><img src="/assets/logo.png" alt="Figuri" /></a>
    <button class="nav-back" onclick="history.back()">← Voltar</button>
  </nav>

  <div class="container">
    <h1>🛒 Seu Carrinho</h1>
    <p class="cart-subtitle" id="cartSubtitle">Carregando...</p>

    <!-- Empty -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">🛒</div>
      <p>Seu carrinho está vazio.<br>Gere uma figurinha e adicione aqui!</p>
      <button class="btn-outline" onclick="window.location.href='/gerar.html'">Gerar Figurinha</button>
    </div>

    <!-- Cart content -->
    <div id="cartContent" style="display:none">
      <div class="cart-list" id="cartList"></div>

      <div class="cart-summary" id="cartSummary"></div>

      <button class="btn-add-more" onclick="window.location.href='/gerar.html'">
        ➕ Gerar e adicionar outra figurinha
      </button>
      <button class="btn-checkout" id="btnCheckout" onclick="startCheckout()">
        Pagar com PIX 🟢
      </button>
    </div>
  </div>

  <!-- MODAL PIX -->
  <div class="pix-overlay" id="pixOverlay">
    <div class="pix-modal">
      <button class="close-btn" onclick="closePixModal()">✕</button>
      <h2>Pague com PIX 🟢</h2>
      <div class="pix-amount" id="pixAmount">R$ 0,00</div>
      <p class="pix-label">Escaneie o QR Code ou copie o código:</p>
      <div class="pix-qr-wrap"><img id="pixQrImg" src="" alt="QR Code PIX" /></div>
      <div class="pix-code-wrap">
        <code id="pixCodeText"></code>
        <button class="pix-copy-btn" id="pixCopyBtn" onclick="copyPixCode()">Copiar</button>
      </div>
      <div class="pix-status" id="pixStatus">
        <span class="dot"></span>
        <span id="pixStatusText">Aguardando pagamento...</span>
      </div>
      <div class="pix-timer" id="pixTimer"></div>
      <div class="pix-success-msg" id="pixSuccessMsg">
        ✅ Pagamento confirmado! Baixando suas figurinhas...
      </div>
    </div>
  </div>

  <script>
    var CART_KEY = 'figuri_cart';

    function getCart() {
      try { return JSON.parse(localStorage.getItem(CART_KEY) || '{"items":[]}'); } catch(_) { return { items: [] }; }
    }
    function saveCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }
    function clearCart() { localStorage.removeItem(CART_KEY); }

    function formatPrice(cents) {
      return 'R$' + (cents / 100).toFixed(2).replace('.', ',');
    }

    // ── RENDER ───────────────────────────────────────────────────────────────
    function renderCart() {
      var cart  = getCart();
      var items = cart.items || [];
      var sub   = document.getElementById('cartSubtitle');
      var empty = document.getElementById('emptyState');
      var cont  = document.getElementById('cartContent');

      if (items.length === 0) {
        sub.textContent  = '0 itens';
        empty.style.display = 'block';
        cont.style.display  = 'none';
        return;
      }

      sub.textContent  = items.length + (items.length === 1 ? ' item' : ' itens');
      empty.style.display = 'none';
      cont.style.display  = 'block';

      // List
      var list = document.getElementById('cartList');
      list.innerHTML = '';
      items.forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'cart-item';
        var nameLabel = item.playerName ? item.playerName.toUpperCase() : 'Sem nome';
        var detailParts = [];
        if (item.country) detailParts.push(item.country.charAt(0).toUpperCase() + item.country.slice(1));
        if (item.playerBirth) detailParts.push(item.playerBirth);
        if (item.playerHeight) detailParts.push(item.playerHeight + 'm');

        div.innerHTML =
          '<img class="item-thumb" src="' + (item.thumbnail || '') + '" alt="figurinha" />' +
          '<div class="item-info">' +
            '<div class="item-product">' + (item.productLabel || item.productType) + '</div>' +
            '<div class="item-name">' + nameLabel + '</div>' +
            '<div class="item-details">' + detailParts.join(' · ') + '</div>' +
          '</div>' +
          '<div class="item-price">' + formatPrice(item.price) + '</div>' +
          '<button class="item-remove" onclick="removeItem(\'' + item.id + '\')" title="Remover">✕</button>';
        list.appendChild(div);
      });

      // Summary
      var total = items.reduce(function(s, i) { return s + i.price; }, 0);
      var sumEl = document.getElementById('cartSummary');
      var rows  = items.map(function(i) {
        return '<div class="summary-row"><span>' + (i.playerName || 'Figurinha') + ' · ' + (i.productLabel || i.productType) + '</span><span>' + formatPrice(i.price) + '</span></div>';
      }).join('');
      sumEl.innerHTML = rows +
        '<div class="summary-row total"><span>Total</span><span>' + formatPrice(total) + '</span></div>';
    }

    function removeItem(id) {
      var cart  = getCart();
      cart.items = cart.items.filter(function(i) { return i.id !== id; });
      saveCart(cart);
      renderCart();
    }

    // ── CHECKOUT ─────────────────────────────────────────────────────────────

    function getSupabaseToken() {
      try {
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key && key.includes('supabase') && key.includes('auth')) {
            var val = JSON.parse(localStorage.getItem(key) || '{}');
            if (val.access_token) return val.access_token;
            if (val.session && val.session.access_token) return val.session.access_token;
          }
        }
      } catch(_) {}
      return null;
    }

    async function startCheckout() {
      var cart  = getCart();
      if (!cart.items || cart.items.length === 0) { alert('Carrinho vazio!'); return; }

      var token = getSupabaseToken();
      if (!token) {
        alert('Você precisa estar logado para comprar.');
        window.location.href = '/login';
        return;
      }

      var btn = document.getElementById('btnCheckout');
      btn.disabled = true;
      btn.textContent = 'Gerando PIX...';

      try {
        var res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ items: cart.items }),
        });

        var data = await res.json();
        if (!res.ok || !data.qr_code) throw new Error(data.error || 'Erro ao gerar PIX');

        openPixModal(data);
      } catch (err) {
        alert('Erro: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Pagar com PIX 🟢';
      }
    }

    // ── PIX MODAL ────────────────────────────────────────────────────────────

    var currentOrderId  = null;
    var pixPollTimer    = null;
    var pixExpireTimer  = null;

    function openPixModal(data) {
      currentOrderId = data.order_id;

      var total = getCart().items.reduce(function(s,i){return s+i.price;},0);
      document.getElementById('pixAmount').textContent = formatPrice(total);

      var qrImg = document.getElementById('pixQrImg');
      if (data.qr_code_base64) {
        qrImg.src = 'data:image/png;base64,' + data.qr_code_base64;
      } else {
        qrImg.src = ''; qrImg.alt = 'Copie o código abaixo';
      }
      document.getElementById('pixCodeText').textContent = data.qr_code;

      if (data.expires_at) {
        var expMs = new Date(data.expires_at).getTime();
        pixExpireTimer = setInterval(function() {
          var rem = Math.max(0, Math.floor((expMs - Date.now()) / 1000));
          var m = Math.floor(rem / 60), s = rem % 60;
          document.getElementById('pixTimer').textContent =
            rem > 0 ? '⏱ Expira em ' + m + ':' + String(s).padStart(2,'0') : 'PIX expirado.';
          if (rem === 0) { clearInterval(pixExpireTimer); stopPolling(); }
        }, 1000);
      }

      document.getElementById('pixOverlay').classList.add('open');
      startPolling();
    }

    function closePixModal() {
      document.getElementById('pixOverlay').classList.remove('open');
      stopPolling();
      if (pixExpireTimer) { clearInterval(pixExpireTimer); pixExpireTimer = null; }
      currentOrderId = null;
    }

    function startPolling() {
      if (pixPollTimer) return;
      pixPollTimer = setInterval(checkOrderStatus, 3000);
    }
    function stopPolling() {
      if (pixPollTimer) { clearInterval(pixPollTimer); pixPollTimer = null; }
    }

    async function checkOrderStatus() {
      if (!currentOrderId) return;
      try {
        var res  = await fetch('/api/orders/status?order_id=' + encodeURIComponent(currentOrderId));
        var data = await res.json();
        if (data.status === 'paid' || data.status === 'approved') {
          stopPolling();
          onOrderApproved();
        } else if (data.status === 'cancelled' || data.status === 'expired') {
          stopPolling();
          document.getElementById('pixStatusText').textContent = 'Pedido ' + data.status + '. Tente novamente.';
        }
      } catch(_) {}
    }

    function onOrderApproved() {
      var statusEl = document.getElementById('pixStatus');
      statusEl.classList.add('approved');
      document.getElementById('pixStatusText').textContent = 'Pagamento aprovado!';
      document.getElementById('pixSuccessMsg').style.display = 'block';
      document.querySelector('.pix-code-wrap').style.display = 'none';

      setTimeout(function() {
        closePixModal();
        downloadAllItems();
        clearCart();
        renderCart();
      }, 2000);
    }

    function downloadAllItems() {
      var items = getCart().items;
      // Para imagens digitais, abre os URLs de hires em novas abas para download
      items.forEach(function(item, idx) {
        if (item.hiresUrl) {
          setTimeout(function() {
            var a = document.createElement('a');
            a.href = item.hiresUrl;
            a.download = 'figurinha-' + (item.playerName || idx+1) + '.png';
            a.target = '_blank';
            a.click();
          }, idx * 600);
        }
      });
    }

    function copyPixCode() {
      var code = document.getElementById('pixCodeText').textContent;
      navigator.clipboard.writeText(code).then(function() {
        var btn = document.getElementById('pixCopyBtn');
        btn.textContent = 'Copiado!'; btn.classList.add('copied');
        setTimeout(function(){ btn.textContent='Copiar'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // Init
    renderCart();
  </script>
</body>
</html>
