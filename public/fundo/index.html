<script>
  function scaleFundo() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var scale = Math.max(vw / 1440, vh / 1213);
    var x = (vw - 1440 * scale) / 2, y = (vh - 1213 * scale) / 2;
    document.getElementById('fundo').style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + scale + ')';
  }
  scaleFundo();
  window.addEventListener('resize', scaleFundo);
</script>
