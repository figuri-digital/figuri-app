<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <title>Fundo Estádio – Figuri</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #396100;
    }

    /* ── Root container ── */
    .fundo {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* All layers fill the container */
    .fundo img,
    .fundo .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      max-width: none;
      display: block;
      object-fit: fill;
    }

    /* Masked layers */
    .masked {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-composite: source-in;
      mask-composite: intersect;
    }
    .masked img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      max-width: none;
      object-fit: fill;
    }

    /* Extended layers (negative insets) */
    .ext-g13  { position:absolute; top:-0.38%; right:0; bottom:-0.27%; left:0; }
    .ext-g33  { position:absolute; top:-0.93%; right:-0.18%; bottom:-0.93%; left:-0.18%; }
    .ext-g34  { position:absolute; top:-4.79%; right:-1.28%; bottom:-4.79%; left:-1.28%; }
    .ext-g36  { position:absolute; top:-7.25%; right:-3.66%; bottom:-7.25%; left:-3.66%; }
    .ext-g37  { position:absolute; top:-1.5px; right:0; bottom:-1.5px; left:0; }
    .ext-g32  { position:absolute; top:-14.15%; right:-0.91%; bottom:-14.15%; left:-0.91%; }
    .ext-g13 img, .ext-g33 img, .ext-g34 img,
    .ext-g36 img, .ext-g37 img, .ext-g32 img {
      position:absolute; top:0; left:0;
      width:100%; height:100%; max-width:none; object-fit:fill;
    }
  </style>
</head>
