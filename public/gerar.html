<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGURI IA — Sua figurinha</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0D0D0B;
    --dark-mid: #1A1A17;
    --verde: #00A651;
    --verde-escuro: #007A3A;
    --verde-neon: #00E05A;
    --ouro-claro: #F5C518;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .gerar-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
    max-width: 420px;
    width: 100%;
  }

  .gerar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--ouro-claro);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }
  .gerar-logo span { color: var(--verde-neon); }

  .scanner-card {
    position: relative;
    width: 280px;
    height: 373px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--dark-mid);
    box-shadow:
      0 0 40px rgba(0, 224, 90, 0.12),
      0 20px 60px rgba(0, 0, 0, 0.5);
    margin-bottom: 28px;
  }

  .scanner-placeholder {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #1a1a17 0%, #252520 50%, #1a1a17 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 1.2s ease, opacity 1.2s ease;
  }
  .scanner-placeholder.processing {
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .scanner-placeholder .placeholder-icon {
    font-size: 80px;
    opacity: 0.15;
  }

  .scanner-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    filter: blur(20px);
    transition: opacity 1s ease, filter 1.2s ease;
  }
  .scanner-image.revealed {
    opacity: 1;
    filter: blur(0px);
  }

  .scanner-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--verde-neon);
    box-shadow: 0 0 20px var(--verde-neon), 0 0 60px rgba(0, 224, 90, 0.4);
    top: 0;
    animation: scan-line 2.5s ease-in-out infinite;
    z-index: 10;
  }
  .scanner-line.stopped {
    animation: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  @keyframes scan-line {
    0% { top: 0; }
    50% { top: calc(100% - 3px); }
    100% { top: 0; }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 30px rgba(0, 224, 90, 0.05); }
    50% { box-shadow: inset 0 0 50px rgba(0, 224, 90, 0.12); }
  }

  .scanner-corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--verde-neon);
    border-style: solid;
    border-width: 0;
    z-index: 5;
    opacity: 0.6;
  }
  .scanner-corner.tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; }
  .scanner-corner.tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; }
  .scanner-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; }
  .scanner-corner.br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; }

  .gerar-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    text-align: center;
  }

  .gerar-progress {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 24px;
    text-align: center;
  }

  .gerar-bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .gerar-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--verde-neon);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .gerar-actions {
    display: none;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .gerar-actions.visible {
    display: flex;
    opacity: 1;
  }

  .btn-buy {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 8px 32px rgba(0,166,81,0.3);
  }
  .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,166,81,0.5); }

  .btn-back {
    display: block;
    width: 100%;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .gerar-credits {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    margin-top: 8px;
  }

  .gerar-error {
    display: none;
    text-align: center;
  }
  .gerar-error.visible { display: block; }
  .gerar-error-msg {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    color: #ff6b6b;
    margin-bottom: 16px;
  }

  @media (max-width: 480px) {
    .scanner-card { width: 240px; height: 320px; }
  }
</style>
</head>
<body>

<div class="gerar-container">
  <div class="gerar-logo">FIGURI <span>IA</span></div>

  <div class="scanner-card" id="scannerCard">
    <div class="scanner-placeholder processing" id="scannerPlaceholder">
      <span class="placeholder-icon">&#9917;</span>
    </div>
    <img class="scanner-image" id="scannerImage" src="" alt="Sua figurinha">
    <div class="scanner-line" id="scannerLine"></div>
    <div class="scanner-corner tl"></div>
    <div class="scanner-corner tr"></div>
    <div class="scanner-corner bl"></div>
    <div class="scanner-corner br"></div>
  </div>

  <div class="gerar-status" id="gerarStatus">Imprimindo sua figurinha...</div>
  <div class="gerar-progress" id="gerarProgress"></div>
  <div class="gerar-bar">
    <div class="gerar-bar-fill" id="gerarBarFill"></div>
  </div>

  <div class="gerar-actions" id="gerarActions">
    <a class="btn-back" href="/">&#8617; Gerar outra</a>
    <button class="btn-buy" id="btnBuy">&#128179; Comprar sem marca d'agua &mdash; R$19,90</button>
    <div class="gerar-credits" id="gerarCredits"></div>
  </div>

  <div class="gerar-error" id="gerarError">
    <div class="gerar-error-msg" id="gerarErrorMsg"></div>
    <a class="btn-back" href="/">&#8617; Voltar e tentar novamente</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = 'https://ytzkwhozesiomcvmkgyl.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0emt3aG96ZXNpb21jdm1rZ3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzA5NDgsImV4cCI6MjA4OTQ0Njk0OH0.jTlhLYMEhs3NA1t1PAExGvdIikSxz2ssL7IWjoMSWNE';

  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var params = new URLSearchParams(window.location.search);
  var taskId = params.get('taskId');
  var imageId = params.get('imageId');
  var userId = params.get('userId');
  var previewUrl = params.get('previewUrl');
  var initialStatus = params.get('status');

  var pollCount = 0;
  var maxPolls = 60; // 60 * 3s = 3 minutes max
  var fakeProgress = 0;

  function showError(msg) {
    document.getElementById('gerarStatus').style.display = 'none';
    document.getElementById('gerarProgress').style.display = 'none';
    document.querySelector('.gerar-bar').style.display = 'none';
    document.getElementById('scannerLine').classList.add('stopped');
    document.getElementById('scannerPlaceholder').classList.remove('processing');
    document.getElementById('gerarErrorMsg').textContent = msg;
    document.getElementById('gerarError').classList.add('visible');
  }

  function showResult(url) {
    document.getElementById('gerarBarFill').style.width = '100%';
    document.getElementById('gerarProgress').textContent = '100%';

    setTimeout(function() {
      document.getElementById('scannerLine').classList.add('stopped');
      document.getElementById('scannerPlaceholder').classList.remove('processing');

      var img = document.getElementById('scannerImage');
      img.src = url;
      img.onload = function() {
        document.getElementById('scannerPlaceholder').style.opacity = '0';
        img.classList.add('revealed');

        setTimeout(function() {
          document.getElementById('gerarStatus').textContent = 'Figurinha pronta!';
          document.getElementById('gerarProgress').style.display = 'none';
          document.querySelector('.gerar-bar').style.display = 'none';
          document.getElementById('gerarActions').classList.add('visible');
        }, 600);
      };
      img.onerror = function() {
        showError('Erro ao carregar a imagem. Tente novamente.');
      };
    }, 1500);
  }

  function updateFakeProgress() {
    // Slow down as it approaches 90%
    var increment = fakeProgress < 30 ? 3 : fakeProgress < 60 ? 2 : fakeProgress < 80 ? 1 : 0.3;
    fakeProgress = Math.min(fakeProgress + increment, 90);
    document.getElementById('gerarBarFill').style.width = Math.round(fakeProgress) + '%';
    document.getElementById('gerarProgress').textContent = Math.round(fakeProgress) + '%';
  }

  async function pollStatus() {
    if (pollCount >= maxPolls) {
      showError('Timeout: a geracao demorou demais. Tente novamente.');
      return;
    }
    pollCount++;
    updateFakeProgress();

    try {
      // Get auth token
      var session = await sb.auth.getSession();
      var token = session?.data?.session?.access_token || '';

      var url = '/api/generate/status?taskId=' + encodeURIComponent(taskId) +
        '&imageId=' + encodeURIComponent(imageId) +
        '&userId=' + encodeURIComponent(userId);

      var res = await fetch(url, {
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      });

      var data = await res.json();
      console.log('Poll #' + pollCount + ':', data);

      if (data.status === 'completed' && data.previewUrl) {
        showResult(data.previewUrl);
        return;
      }

      if (data.status === 'failed') {
        showError(data.error || 'Geracao falhou. Tente outra foto.');
        return;
      }

      // Still processing — poll again in 3 seconds
      setTimeout(pollStatus, 3000);
    } catch (err) {
      console.error('Poll error:', err);
      setTimeout(pollStatus, 3000);
    }
  }

  // Init
  if (!imageId) {
    showError('Parametros invalidos. Volte e tente gerar novamente.');
  } else if (initialStatus === 'completed' && previewUrl) {
    // Result came directly (sync response)
    var quickInterval = setInterval(function() {
      fakeProgress += Math.random() * 15 + 5;
      fakeProgress = Math.min(fakeProgress, 95);
      document.getElementById('gerarBarFill').style.width = Math.round(fakeProgress) + '%';
      document.getElementById('gerarProgress').textContent = Math.round(fakeProgress) + '%';
      if (fakeProgress >= 95) {
        clearInterval(quickInterval);
        showResult(previewUrl);
      }
    }, 200);
  } else if (taskId && imageId && userId) {
    // Async — need to poll
    pollStatus();
  } else {
    showError('Parametros invalidos. Volte e tente gerar novamente.');
  }

  // Buy button
  document.getElementById('btnBuy').addEventListener('click', function() {
    alert('Checkout em breve! ID da figurinha: ' + imageId);
  });
</script>
</body>
</html>
