<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGURI IA — Sua figurinha</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0D0D0B;
    --dark-mid: #1A1A17;
    --verde: #00A651;
    --verde-escuro: #007A3A;
    --verde-neon: #00E05A;
    --ouro-claro: #F5C518;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .gerar-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
    max-width: 800px;
    width: 100%;
  }

  .gerar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--ouro-claro);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }
  .gerar-logo span { color: var(--verde-neon); }

  /* ── PHASE 1: Scanner (loading) ── */
  #phase-loading { text-align: center; }

  .scanner-card {
    position: relative;
    width: 280px;
    height: 373px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--dark-mid);
    box-shadow: 0 0 40px rgba(0, 224, 90, 0.12), 0 20px 60px rgba(0, 0, 0, 0.5);
    margin: 0 auto 28px;
  }

  .scanner-placeholder {
    position: absolute; inset: 0;
    background: linear-gradient(145deg, #1a1a17 0%, #252520 50%, #1a1a17 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .scanner-placeholder.processing { animation: pulse-glow 2s ease-in-out infinite; }
  .scanner-placeholder .placeholder-icon { font-size: 80px; opacity: 0.15; }

  .scanner-line {
    position: absolute; left: 0; right: 0; height: 3px;
    background: var(--verde-neon);
    box-shadow: 0 0 20px var(--verde-neon), 0 0 60px rgba(0, 224, 90, 0.4);
    top: 0; animation: scan-line 2.5s ease-in-out infinite; z-index: 10;
  }
  .scanner-line.stopped { animation: none; opacity: 0; transition: opacity 0.5s; }

  .scanner-corner {
    position: absolute; width: 20px; height: 20px;
    border-color: var(--verde-neon); border-style: solid; border-width: 0;
    z-index: 5; opacity: 0.6;
  }
  .scanner-corner.tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; }
  .scanner-corner.tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; }
  .scanner-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; }
  .scanner-corner.br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; }

  @keyframes scan-line { 0% { top: 0; } 50% { top: calc(100% - 3px); } 100% { top: 0; } }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 30px rgba(0, 224, 90, 0.05); }
    50% { box-shadow: inset 0 0 50px rgba(0, 224, 90, 0.12); }
  }

  .gerar-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; color: #fff;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .gerar-progress {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 24px;
  }

  .gerar-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin: 0 auto 32px; }
  .gerar-bar-fill { height: 100%; width: 0%; background: var(--verde-neon); border-radius: 2px; transition: width 0.5s ease; }

  /* ── PHASE 2: Choose from 3 ── */
  #phase-choose { display: none; }

  .choose-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--verde-neon);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 8px;
  }

  .choose-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    color: #888;
    text-align: center;
    margin-bottom: 24px;
  }

  .variations-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
    width: 100%;
  }

  .variation-card {
    background: var(--dark-mid);
    border: 2px solid #333;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .variation-card:hover { border-color: var(--verde); transform: translateY(-4px); }
  .variation-card.selected {
    border-color: var(--ouro-claro);
    box-shadow: 0 0 30px rgba(245, 197, 24, 0.25);
  }

  .variation-card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
  }

  .variation-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-align: center;
    padding: 10px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .variation-card.selected .variation-label { color: var(--ouro-claro); }

  .variation-check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: var(--ouro-claro);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--dark);
    font-weight: bold;
  }
  .variation-card.selected .variation-check { display: flex; }

  .choose-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }

  .btn-buy {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 16px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 14px; border-radius: 8px; border: none;
    cursor: pointer; text-align: center; text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 8px 32px rgba(0,166,81,0.3);
  }
  .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,166,81,0.5); }
  .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-back {
    display: block; width: 100%;
    background: transparent; color: rgba(255,255,255,0.6);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    padding: 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer; text-align: center; text-decoration: none;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .gerar-credits {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.35);
    text-align: center; margin-top: 8px;
  }

  /* ── Error ── */
  .gerar-error { display: none; text-align: center; }
  .gerar-error.visible { display: block; }
  .gerar-error-msg {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; color: #ff6b6b; margin-bottom: 16px;
  }

  /* ── SOCIAL PROOF ── */
  .toast-container {
    position: fixed; bottom: 24px; left: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    background: rgba(26,26,23,0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 3px solid var(--verde);
    border-radius: 8px; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(12px);
    opacity: 0; transform: translateY(20px) scale(0.95);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 340px;
  }
  .toast.visible { opacity: 1; transform: translateY(0) scale(1); }
  .toast.exit { opacity: 0; transform: translateY(-10px) scale(0.95); }
  .toast-flag { font-size: 22px; flex-shrink: 0; }
  .toast-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.3;
  }
  .toast-text strong { color: #fff; font-weight: 700; }
  .toast-text .toast-city { color: rgba(255,255,255,0.4); font-size: 11px; }

  .live-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.35);
    text-align: center; margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .live-counter .live-dot {
    width: 6px; height: 6px; background: #ff4444;
    border-radius: 50%; animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-counter .counter-num { color: var(--ouro-claro); font-weight: 700; font-size: 14px; }

  @media (max-width: 640px) {
    .variations-grid { grid-template-columns: 1fr; max-width: 280px; margin: 0 auto 24px; }
    .scanner-card { width: 240px; height: 320px; }
    .toast-container { left: 12px; right: 12px; bottom: 16px; }
    .toast { max-width: 100%; }
    .choose-title { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="gerar-container">
  <div class="gerar-logo">FIGURI <span>IA</span></div>

  <!-- PHASE 1: Loading/Scanner -->
  <div id="phase-loading">
    <div class="scanner-card" id="scannerCard">
      <div class="scanner-placeholder processing" id="scannerPlaceholder">
        <span class="placeholder-icon">&#9917;</span>
      </div>
      <div class="scanner-line" id="scannerLine"></div>
      <div class="scanner-corner tl"></div>
      <div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div>
      <div class="scanner-corner br"></div>
    </div>

    <div class="gerar-status" id="gerarStatus">Analisando sua foto...</div>
    <div class="gerar-progress" id="gerarProgress"></div>

    <div class="live-counter" id="liveCounter">
      <span class="live-dot"></span>
      <span><span class="counter-num" id="counterNum">847</span> figurinhas geradas hoje</span>
    </div>
    <div class="gerar-bar">
      <div class="gerar-bar-fill" id="gerarBarFill"></div>
    </div>
  </div>

  <!-- PHASE 2: Choose variation -->
  <div id="phase-choose">
    <h2 class="choose-title">Escolha sua figurinha favorita</h2>
    <p class="choose-subtitle">Clique na que voce mais gostou</p>

    <div class="variations-grid" id="variationsGrid"></div>

    <div class="choose-actions">
      <button class="btn-buy" id="btnBuy" disabled>Comprar sem marca d'agua — R$19,90</button>
      <a class="btn-back" href="/">&#8617; Gerar novas opcoes</a>
      <div class="gerar-credits" id="gerarCredits"></div>
    </div>
  </div>

  <!-- Error -->
  <div class="gerar-error" id="gerarError">
    <div class="gerar-error-msg" id="gerarErrorMsg"></div>
    <a class="btn-back" href="/">&#8617; Voltar e tentar novamente</a>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  var SUPABASE_URL = 'https://ytzkwhozesiomcvmkgyl.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0emt3aG96ZXNpb21jdm1rZ3lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzA5NDgsImV4cCI6MjA4OTQ0Njk0OH0.jTlhLYMEhs3NA1t1PAExGvdIikSxz2ssL7IWjoMSWNE';

  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var params = new URLSearchParams(window.location.search);
  var taskIdsParam = params.get('taskIds');
  var imageId = params.get('imageId');
  var userId = params.get('userId');
  var statusUrlsParam = params.get('statusUrls') || '';
  var responseUrlsParam = params.get('responseUrls') || '';

  var pollCount = 0;
  var maxPolls = 80;
  var fakeProgress = 0;
  var selectedVariation = null;
  var toastIsGenerating = true;

  // Progressive status messages
  var statusMessages = [
    { at: 0,  text: 'Analisando sua foto...' },
    { at: 10, text: 'Identificando caracteristicas do rosto...' },
    { at: 20, text: 'Preparando o template da selecao...' },
    { at: 35, text: 'Gerando sua figurinha com IA...' },
    { at: 50, text: 'A imagem esta quase pronta...' },
    { at: 65, text: 'Aplicando detalhes finais...' },
    { at: 78, text: 'Finalizando suas opcoes...' },
    { at: 88, text: 'So mais um instante...' },
  ];

  function showError(msg) {
    toastIsGenerating = false;
    document.getElementById('phase-loading').style.display = 'none';
    document.getElementById('phase-choose').style.display = 'none';
    document.getElementById('gerarErrorMsg').textContent = msg;
    document.getElementById('gerarError').classList.add('visible');
  }

  function showChoosePhase(variations) {
    toastIsGenerating = false;
    document.getElementById('phase-loading').style.display = 'none';
    document.getElementById('phase-choose').style.display = 'block';

    var grid = document.getElementById('variationsGrid');
    grid.innerHTML = '';

    variations.forEach(function(v, i) {
      var card = document.createElement('div');
      card.className = 'variation-card';
      card.setAttribute('data-index', i);
      card.setAttribute('data-preview', v.previewUrl);
      card.setAttribute('data-hires', v.hiresUrl || '');
      card.innerHTML =
        '<div class="variation-check">✓</div>' +
        '<img src="' + v.previewUrl + '" alt="Opcao ' + (i + 1) + '">' +
        '<div class="variation-label">Opcao ' + (i + 1) + '</div>';

      card.addEventListener('click', function() {
        document.querySelectorAll('.variation-card').forEach(function(c) {
          c.classList.remove('selected');
        });
        card.classList.add('selected');
        selectedVariation = {
          index: i,
          previewUrl: v.previewUrl,
          hiresUrl: v.hiresUrl,
        };
        document.getElementById('btnBuy').disabled = false;
      });

      grid.appendChild(card);
    });
  }

  function updateFakeProgress() {
    var increment = fakeProgress < 30 ? 3 : fakeProgress < 60 ? 2 : fakeProgress < 80 ? 1 : 0.3;
    fakeProgress = Math.min(fakeProgress + increment, 90);
    document.getElementById('gerarBarFill').style.width = Math.round(fakeProgress) + '%';
    document.getElementById('gerarProgress').textContent = Math.round(fakeProgress) + '%';

    // Update status message based on progress
    var statusEl = document.getElementById('gerarStatus');
    for (var i = statusMessages.length - 1; i >= 0; i--) {
      if (fakeProgress >= statusMessages[i].at) {
        statusEl.textContent = statusMessages[i].text;
        break;
      }
    }
  }

  async function pollStatus() {
    if (pollCount >= maxPolls) {
      showError('Timeout: a geracao demorou demais. Tente novamente.');
      return;
    }
    pollCount++;
    updateFakeProgress();

    try {
      var session = await sb.auth.getSession();
      var token = session?.data?.session?.access_token || '';

      var url = '/api/generate/status?taskIds=' + encodeURIComponent(taskIdsParam) +
        '&imageId=' + encodeURIComponent(imageId) +
        '&userId=' + encodeURIComponent(userId) +
        '&statusUrls=' + encodeURIComponent(statusUrlsParam) +
        '&responseUrls=' + encodeURIComponent(responseUrlsParam);

      var res = await fetch(url, {
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      });

      var data = await res.json();
      console.log('Poll #' + pollCount + ':', data);

      if (data.status === 'completed' && data.variations) {
        // All done — show the 3 options
        document.getElementById('gerarBarFill').style.width = '100%';
        document.getElementById('gerarProgress').textContent = '100%';
        document.getElementById('gerarStatus').textContent = 'Pronto!';

        setTimeout(function() {
          showChoosePhase(data.variations);

          if (data.creditsUsed !== undefined) {
            document.getElementById('gerarCredits').textContent =
              'Previews: ' + data.creditsUsed + '/' + data.creditsLimit;
          }
        }, 1000);
        return;
      }

      if (data.status === 'failed') {
        showError(data.error || 'Geracao falhou. Tente outra foto.');
        return;
      }

      // Update status text with partial progress
      if (data.variations) {
        var done = data.variations.filter(function(v) { return v.status === 'completed'; }).length;
        var total = data.variations.length;
        if (done > 0) {
          document.getElementById('gerarStatus').textContent =
            done + ' de ' + total + ' opcoes prontas...';
        }
      }

      setTimeout(pollStatus, 3000);
    } catch (err) {
      console.error('Poll error:', err);
      setTimeout(pollStatus, 3000);
    }
  }

  // Init
  if (!imageId || !taskIdsParam) {
    showError('Parametros invalidos. Volte e tente gerar novamente.');
  } else {
    pollStatus();
  }

  // Buy button
  document.getElementById('btnBuy').addEventListener('click', function() {
    if (!selectedVariation) {
      alert('Selecione uma figurinha primeiro.');
      return;
    }
    alert('Checkout em breve! Figurinha: ' + imageId + ' | Opcao: ' + (selectedVariation.index + 1));
  });

  // ── SOCIAL PROOF TOASTS ──
  var toastNames = [
    { name: 'Maria S.', city: 'São Paulo' }, { name: 'Lucas F.', city: 'Curitiba' },
    { name: 'Ana P.', city: 'Recife' }, { name: 'Pedro M.', city: 'Belo Horizonte' },
    { name: 'Julia R.', city: 'Porto Alegre' }, { name: 'Rafael C.', city: 'Rio de Janeiro' },
    { name: 'Camila T.', city: 'Salvador' }, { name: 'Bruno L.', city: 'Brasília' },
    { name: 'Fernanda A.', city: 'Fortaleza' }, { name: 'Gustavo N.', city: 'Manaus' },
    { name: 'Isabela V.', city: 'Goiânia' }, { name: 'Thiago D.', city: 'Florianópolis' },
    { name: 'Larissa B.', city: 'Campinas' }, { name: 'Matheus G.', city: 'Belém' },
    { name: 'Carolina H.', city: 'Vitória' }, { name: 'Diego O.', city: 'Natal' },
  ];

  var toastCountries = [
    { flag: '🇧🇷', name: 'Brasil' }, { flag: '🇦🇷', name: 'Argentina' },
    { flag: '🇫🇷', name: 'França' }, { flag: '🇩🇪', name: 'Alemanha' },
    { flag: '🇪🇸', name: 'Espanha' }, { flag: '🇵🇹', name: 'Portugal' },
    { flag: '🇺🇾', name: 'Uruguai' }, { flag: '🇨🇴', name: 'Colômbia' },
  ];

  var toastMessages = [
    function(n, c) { return '<strong>' + n.name + '</strong> acabou de gerar sua figurinha! <span class="toast-city">' + n.city + '</span>'; },
    function(n, c) { return '<strong>' + n.name + '</strong> escolheu ' + c.name + ' <span class="toast-city">' + n.city + '</span>'; },
    function(n, c) { return '<strong>' + n.name + '</strong> está gerando agora... <span class="toast-city">' + n.city + '</span>'; },
    function(n, c) { return '<strong>' + n.name + '</strong> comprou sem marca d\'água! <span class="toast-city">' + n.city + '</span>'; },
  ];

  function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function showToast() {
    if (!toastIsGenerating) return;
    var person = getRandomItem(toastNames);
    var country = getRandomItem(toastCountries);
    var msgFn = getRandomItem(toastMessages);

    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = '<span class="toast-flag">' + country.flag + '</span><span class="toast-text">' + msgFn(person, country) + '</span>';

    var container = document.getElementById('toastContainer');
    container.appendChild(toast);
    setTimeout(function() { toast.classList.add('visible'); }, 50);
    setTimeout(function() {
      toast.classList.remove('visible'); toast.classList.add('exit');
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
    }, 4000);

    var toasts = container.querySelectorAll('.toast');
    if (toasts.length > 2) {
      var old = toasts[0];
      old.classList.remove('visible'); old.classList.add('exit');
      setTimeout(function() { if (old.parentNode) old.parentNode.removeChild(old); }, 400);
    }

    setTimeout(showToast, 4000 + Math.random() * 3000);
  }
  setTimeout(showToast, 2000);

  var counterBase = 800 + Math.floor(Math.random() * 200);
  document.getElementById('counterNum').textContent = counterBase;
  setInterval(function() {
    if (!toastIsGenerating) return;
    counterBase += Math.floor(Math.random() * 3) + 1;
    document.getElementById('counterNum').textContent = counterBase;
  }, 8000 + Math.random() * 5000);
</script>
</body>
</html>
