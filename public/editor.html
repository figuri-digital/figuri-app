<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIGURI IA — Editor de Figurinha</title>
  <link rel="icon" type="image/svg+xml" href="/fav.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #F5C518;
    }
    .subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .editor-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      max-width: 1100px;
      width: 100%;
    }

    /* === CARD PREVIEW === */
    .card-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .arrow-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .arrow-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #F5C518;
      color: #F5C518;
    }

    .card-wrapper {
      position: relative;
      width: 380px;
      aspect-ratio: 3/4;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .card-wrapper canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Moldura color indicator */
    .moldura-indicator {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .moldura-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .moldura-dot.active {
      border-color: #F5C518;
      transform: scale(1.2);
      box-shadow: 0 0 8px rgba(245,197,24,0.5);
    }
    /* Moldura dot colors set dynamically via JS */
    #molduraDots { display: flex; gap: 8px; justify-content: center; }

    /* === CONTROLS === */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control-group {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
    }

    .control-group h3 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: #F5C518;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .field {
      margin-bottom: 14px;
    }
    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: #F5C518;
    }
    .field input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* Moldura selector */
    .moldura-options {
      display: flex;
      gap: 10px;
    }
    .moldura-option {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .moldura-option.active {
      border-color: #F5C518;
      background: rgba(245,197,24,0.1);
    }
    .moldura-option:hover {
      border-color: rgba(255,255,255,0.3);
    }
    /* Moldura option colors set dynamically via JS */

    .btn-comprar {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1B8C3D, #15692E);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-comprar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(27,140,61,0.4);
    }

    .btn-download {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #999;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-download:hover {
      border-color: #fff;
      color: #fff;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .editor-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 16px;
      }
      .card-wrapper { width: min(300px, 90vw); }
      .controls { width: 100%; }
    }

    @media (max-width: 600px) {
      .card-wrapper { width: min(280px, 88vw); }
      .editor-container { gap: 16px; padding: 12px; }
      .control-group { padding: 16px; }
    }

    @media (max-width: 480px) {
      .card-wrapper { width: min(260px, 92vw); }
      .editor-container { gap: 12px; padding: 10px 8px; }
      .control-group { padding: 12px; }
      .field { margin-bottom: 10px; }
      .arrow-btn { width: 48px; height: 48px; }
      .moldura-options { gap: 6px; flex-wrap: wrap; }
      .btn-comprar { padding: 18px; font-size: 1rem; }
    }
    /* ────────────────────────────────────────
       MODAL PIX
    ──────────────────────────────────────── */
    .pix-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .pix-overlay.open { display: flex; }

    .pix-modal {
      background: #111;
      border: 1px solid #2a5a00;
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 420px;
      width: 94vw;
      text-align: center;
      position: relative;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }

    .pix-modal .close-btn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: #888; font-size: 22px; cursor: pointer;
    }
    .pix-modal .close-btn:hover { color: #fff; }

    .pix-modal h2 { font-size: 1.3rem; color: #94DD2D; margin-bottom: 4px; }
    .pix-modal .pix-amount { font-size: 2rem; font-weight: 800; color: #FFC300; margin: 8px 0 18px; }
    .pix-modal .pix-label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }

    .pix-qr-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      width: 180px; height: 180px;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .pix-qr-wrap img { width: 160px; height: 160px; display: block; }

    .pix-code-wrap {
      background: #1a2b01;
      border: 1px solid #2e4a05;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .pix-code-wrap code {
      font-size: 0.65rem;
      color: #94DD2D;
      word-break: break-all;
      flex: 1;
      text-align: left;
      font-family: monospace;
      line-height: 1.4;
    }
    .pix-copy-btn {
      flex-shrink: 0;
      background: #94DD2D;
      color: #1a2b01;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .pix-copy-btn.copied { background: #FFC300; }
    .pix-copy-btn:hover { background: #a8f033; }

    .pix-status {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.85rem; color: #aaa; margin-bottom: 10px;
    }
    .pix-status .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #FFC300;
      animation: pulse 1.2s infinite;
    }
    .pix-status.approved .dot { background: #94DD2D; animation: none; }
    .pix-status.approved { color: #94DD2D; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    .pix-timer { font-size: 0.75rem; color: #666; margin-top: 6px; }
    .pix-success-msg {
      display: none; padding: 16px;
      background: rgba(148,221,45,0.12);
      border: 1px solid #94DD2D;
      border-radius: 12px;
      color: #94DD2D;
      font-size: 0.95rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <!-- ██████████  MODAL PIX  ██████████ -->
  <div class="pix-overlay" id="pixOverlay">
    <div class="pix-modal">
      <button class="close-btn" onclick="closePixModal()" title="Fechar">✕</button>

      <h2>Pague com PIX 🟢</h2>
      <div class="pix-amount" id="pixAmount">R$ 19,90</div>
      <p class="pix-label">Escaneie o QR Code ou copie o código abaixo:</p>

      <div class="pix-qr-wrap">
        <img id="pixQrImg" src="" alt="QR Code PIX" />
      </div>

      <div class="pix-code-wrap">
        <code id="pixCodeText"></code>
        <button class="pix-copy-btn" id="pixCopyBtn" onclick="copyPixCode()">Copiar</button>
      </div>

      <div class="pix-status" id="pixStatus">
        <span class="dot"></span>
        <span id="pixStatusText">Aguardando pagamento...</span>
      </div>
      <div class="pix-timer" id="pixTimer"></div>

      <div class="pix-success-msg" id="pixSuccessMsg">
        ✅ Pagamento confirmado! Preparando sua figurinha...
      </div>
    </div>
  </div>
  <button onclick="goBackToChoose()" style="align-self:flex-start; background:none; border:1px solid #555; color:#ccc; padding:8px 16px; border-radius:8px; cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; margin-bottom:12px;">← Voltar e trocar opção</button>
  <h1>EDITOR DE FIGURINHA</h1>
  <p class="subtitle">Escolha a moldura e personalize os textos</p>

  <div class="editor-container">
    <!-- Left: Card Preview with Arrows -->
    <div>
      <div class="card-area">
        <button class="arrow-btn" onclick="prevMoldura()">&#8249;</button>
        <div class="card-wrapper">
          <canvas id="cardCanvas" width="1543" height="2047"></canvas>
        </div>
        <button class="arrow-btn" onclick="nextMoldura()">&#8250;</button>
      </div>
      <div class="moldura-indicator">
        <div id="molduraDots"></div>
      </div>
    </div>

    <!-- Right: Controls -->
    <div class="controls">
      <!-- Text Fields -->
      <div class="control-group">
        <h3>Detalhes do Jogador</h3>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="playerName" value="" placeholder="Ex: SEU NOME" maxlength="20" oninput="renderCard()" />
        </div>
        <div class="field">
          <label>Data de Nascimento</label>
          <input type="text" id="playerBirth" value="" placeholder="Ex: 15/03/1995" maxlength="10" oninput="formatBirth(this); renderCard()" />
        </div>
        <div class="field" id="alturaGroup">
          <label>Altura</label>
          <input type="text" id="playerHeight" value="" placeholder="Ex: 1,75" maxlength="4" oninput="formatHeight(this); renderCard()" />
        </div>
      </div>

      <!-- Actions -->
      <button class="btn-comprar" onclick="handleBuy()">Comprar por R$19,90</button>
      <button class="btn-download" onclick="downloadPreview()">Baixar Preview (com marca d'agua)</button>
    </div>
  </div>

  <script>
    // ── BACK TO CHOOSE ──
    function goBackToChoose() {
      var savedImageId = new URLSearchParams(window.location.search).get('imageId') || '';
      window.location.href = 'gerar.html?restore=true&imageId=' + encodeURIComponent(savedImageId);
    }

    // ── CONFIG ──
    var CANVAS_W = 1543;
    var CANVAS_H = 2047;

    // Auto-format birth date: inserts / after DD and MM
    function formatBirth(input) {
      var v = input.value.replace(/\D/g, '').slice(0, 8);
      if (v.length >= 5) {
        input.value = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
      } else if (v.length >= 3) {
        input.value = v.slice(0, 2) + '/' + v.slice(2);
      } else {
        input.value = v;
      }
    }

    // Auto-format height: inserts , after first digit
    function formatHeight(input) {
      var v = input.value.replace(/\D/g, '').slice(0, 3);
      if (v.length >= 2) {
        input.value = v.slice(0, 1) + ',' + v.slice(1);
      } else {
        input.value = v;
      }
    }

    // ── READ URL PARAMS ──
    var editorParams = new URLSearchParams(window.location.search);
    var paramImageUrl = editorParams.get('imageUrl') || '';
    var paramHiresUrl = editorParams.get('hiresUrl') || '';
    var paramImageId = editorParams.get('imageId') || '';
    var paramCountry = editorParams.get('country') || 'brasil';
    var paramType = editorParams.get('type') || 'jogador'; // jogador | pet | familia
    var paramTextColors = (function() {
      try { return JSON.parse(editorParams.get('textColors') || '{}'); } catch(_) { return {}; }
    })();
    var legacyColor = editorParams.get('textColor') || '#FFFFFF';

    // Returns color for a specific moldura + field (name|birth|height)
    // Supports new {name,birth,height} per-moldura structure and legacy string
    function getFieldColor(moldura, field) {
      var m = paramTextColors[moldura];
      if (!m) return legacyColor;
      if (typeof m === 'string') return m;
      return m[field] || legacyColor;
    }

    var isPetOrCasal = (paramType === 'pet' || paramType === 'familia');

    // Hide Altura field for pet and casal
    if (isPetOrCasal) {
      var alturaGroup = document.getElementById('alturaGroup');
      if (alturaGroup) alturaGroup.style.display = 'none';
    }

    // Country moldura config — how many molduras each country has
    var COUNTRY_MOLDURAS = {
      brasil: 4, argentina: 4, colombia: 4, uruguai: 4,
      franca: 4, alemanha: 4, portugal: 4, espanha: 4,
    };

    var numMolduras = COUNTRY_MOLDURAS[paramCountry] || 4;
    var MOLDURAS = [];
    for (var i = 1; i <= numMolduras; i++) {
      MOLDURAS.push(String(i).padStart(2, '0'));
    }
    var currentMolduraIndex = 0;

    // Text positions (based on 1543x2047 canvas)
    var TEXT_CONFIG = {
      name:   { x: 240, y: 1750, font: '700 72px Sora', color: getFieldColor('01', 'name') },
      height: { x: 320, y: 1870, font: '400 48px Sora', color: getFieldColor('01', 'height') },
      birth:  { x: 570, y: 1870, font: '400 48px Sora', color: getFieldColor('01', 'birth') },
    };

    function updateTextConfigColor(moldura) {
      TEXT_CONFIG.name.color   = getFieldColor(moldura, 'name');
      TEXT_CONFIG.height.color = getFieldColor(moldura, 'height');
      TEXT_CONFIG.birth.color  = getFieldColor(moldura, 'birth');
    }

    // ── IMAGE CACHE ──
    var layoutImg = new Image();
    var molduraImgs = {};
    var imagesLoaded = 0;
    var totalImages = 1 + numMolduras;

    function onImageLoad() {
      imagesLoaded++;
      if (imagesLoaded >= totalImages) {
        renderCard();
      }
    }

    // Load layout (use generated image from URL params if available)
    layoutImg.crossOrigin = 'anonymous';
    layoutImg.onload = onImageLoad;
    layoutImg.src = paramImageUrl || '/assets/layouts/' + paramCountry + '.png';

    // Load molduras dynamically based on country and type
    MOLDURAS.forEach(function(m) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = onImageLoad;
      var molduraPath = isPetOrCasal
        ? '/assets/molduras/' + paramCountry + '/pet-casal/' + m + '-pet-casal.png'
        : '/assets/molduras/' + paramCountry + '/' + m + '-sozinho.png';
      img.src = molduraPath;
      molduraImgs[m] = img;
    });

    // ── RENDER ──
    function renderCard() {
      var canvas = document.getElementById('cardCanvas');
      var ctx = canvas.getContext('2d');

      // Clear
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      // 1. Draw layout (jogador) — fit to canvas
      if (layoutImg.complete && layoutImg.naturalWidth) {
        // Calculate scaling to fit layout into canvas
        var scale = Math.max(CANVAS_W / layoutImg.naturalWidth, CANVAS_H / layoutImg.naturalHeight);
        var sw = layoutImg.naturalWidth * scale;
        var sh = layoutImg.naturalHeight * scale;
        var sx = (CANVAS_W - sw) / 2;
        var sy = (CANVAS_H - sh) / 2;
        ctx.drawImage(layoutImg, sx, sy, sw, sh);
      }

      // 2. Draw moldura overlay
      var currentMoldura = MOLDURAS[currentMolduraIndex];
      var molduraImg = molduraImgs[currentMoldura];
      if (molduraImg && molduraImg.complete && molduraImg.naturalWidth) {
        ctx.drawImage(molduraImg, 0, 0, CANVAS_W, CANVAS_H);
      }

      // 3. Draw texts
      var name = (document.getElementById('playerName').value || '').toUpperCase();
      var birth = (document.getElementById('playerBirth').value || '').toUpperCase();
      var height = (document.getElementById('playerHeight').value || '').toUpperCase();

      // Format birth: replace / with -
      birth = birth.replace(/\//g, '-');

      // Name — bold, centered
      ctx.font = TEXT_CONFIG.name.font;
      ctx.fillStyle = TEXT_CONFIG.name.color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      // Add text shadow for readability
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      ctx.fillText(name, TEXT_CONFIG.name.x, TEXT_CONFIG.name.y);

      // Height — only for sozinho
      if (!isPetOrCasal) {
        ctx.font = TEXT_CONFIG.height.font;
        ctx.fillText(height, TEXT_CONFIG.height.x, TEXT_CONFIG.height.y);
      }

      // Birth — regular, centered at its position
      ctx.font = TEXT_CONFIG.birth.font;
      ctx.fillText(birth, TEXT_CONFIG.birth.x, TEXT_CONFIG.birth.y);

      // Reset shadow
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    // ── MOLDURA CONTROLS ──
    // ── BUILD MOLDURA UI DYNAMICALLY ──
    var dotsContainer = document.getElementById('molduraDots');
    var btnsContainer = document.getElementById('molduraButtons');
    // Colors per country — index matches moldura 01, 02, 03, 04
    var COUNTRY_COLORS = {
      brasil:    ['#ffffff', '#1B8C3D', '#1E3A8A', '#F5C518'],
      argentina: ['#ffffff', '#74ACDF', '#1A3A6E', '#F6C517'],
      colombia:  ['#ffffff', '#FCD116', '#003087', '#CE1126'],
      uruguai:   ['#ffffff', '#5B9FFF', '#003DA5', '#FFFFFF'],
      franca:    ['#ffffff', '#002395', '#ED2939', '#FFFFFF'],
      alemanha:  ['#ffffff'],
      portugal:  ['#ffffff'],
      espanha:   ['#ffffff'],
    };
    var molduraColors = COUNTRY_COLORS[paramCountry] || ['#ffffff', '#888', '#555', '#333'];

    MOLDURAS.forEach(function(m, idx) {
      // Dot
      var dot = document.createElement('div');
      dot.className = 'moldura-dot' + (idx === 0 ? ' active' : '');
      dot.style.background = molduraColors[idx] || '#888';
      dot.dataset.color = m;
      dot.onclick = function() { setMoldura(m); };
      dotsContainer.appendChild(dot);

      // Button
      var btn = document.createElement('div');
      btn.className = 'moldura-option' + (idx === 0 ? ' active' : '');
      btn.dataset.m = m;
      btn.textContent = 'Moldura ' + (idx + 1);
      btn.onclick = function() { setMoldura(m); };
      btnsContainer.appendChild(btn);
    });

    function setMoldura(name) {
      currentMolduraIndex = MOLDURAS.indexOf(name);
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function nextMoldura() {
      currentMolduraIndex = (currentMolduraIndex + 1) % MOLDURAS.length;
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function prevMoldura() {
      currentMolduraIndex = (currentMolduraIndex - 1 + MOLDURAS.length) % MOLDURAS.length;
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function updateMolduraUI() {
      var current = MOLDURAS[currentMolduraIndex];

      // Update dots
      document.querySelectorAll('.moldura-dot').forEach(function(dot) {
        dot.classList.toggle('active', dot.dataset.color === current);
      });

      // Update options
      document.querySelectorAll('.moldura-option').forEach(function(opt) {
        opt.classList.toggle('active', opt.dataset.m === current);
      });
    }

    // ── PIX PAYMENT ──────────────────────────────────────────────────────────

    var pixPaymentId   = null;
    var pixPollTimer   = null;
    var pixExpireTimer = null;

    async function handleBuy() {
      // Pega token de sessão do Supabase (localStorage)
      var token = getSupabaseToken();
      if (!token) {
        alert('Você precisa estar logado para comprar. Por favor, entre na sua conta.');
        window.location.href = '/login';
        return;
      }

      var buyBtn = document.querySelector('.btn-comprar');
      if (buyBtn) { buyBtn.disabled = true; buyBtn.textContent = 'Gerando PIX...'; }

      try {
        var res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({
            imageId:        paramImageId,
            variationIndex: parseInt(editorParams.get('varIndex') || '0', 10),
            productType:    'digital',
          }),
        });

        var data = await res.json();

        if (!res.ok || !data.qr_code) {
          throw new Error(data.error || 'Erro ao gerar PIX');
        }

        openPixModal(data);
      } catch (err) {
        alert('Erro: ' + err.message);
      } finally {
        if (buyBtn) { buyBtn.disabled = false; buyBtn.textContent = 'Comprar por R$19,90'; }
      }
    }

    function getSupabaseToken() {
      // Tenta chaves comuns do Supabase no localStorage
      try {
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key && key.includes('supabase') && key.includes('auth')) {
            var val = JSON.parse(localStorage.getItem(key) || '{}');
            if (val.access_token) return val.access_token;
            if (val.session && val.session.access_token) return val.session.access_token;
          }
        }
      } catch(_) {}
      return null;
    }

    function openPixModal(data) {
      pixPaymentId = data.payment_id;

      // Valor formatado
      var reais = (data.amount / 100).toFixed(2).replace('.', ',');
      document.getElementById('pixAmount').textContent = 'R$ ' + reais;

      // QR Code
      var qrImg = document.getElementById('pixQrImg');
      if (data.qr_code_base64) {
        qrImg.src = 'data:image/png;base64,' + data.qr_code_base64;
      } else {
        qrImg.src = '';
        qrImg.alt = 'Copie o código abaixo';
      }

      // Código copia-e-cola
      document.getElementById('pixCodeText').textContent = data.qr_code;

      // Timer de expiração
      if (data.expires_at) {
        var expMs = new Date(data.expires_at).getTime();
        pixExpireTimer = setInterval(function() {
          var remaining = Math.max(0, Math.floor((expMs - Date.now()) / 1000));
          var min = Math.floor(remaining / 60);
          var sec = remaining % 60;
          document.getElementById('pixTimer').textContent =
            remaining > 0
              ? '⏱ Expira em ' + min + ':' + String(sec).padStart(2, '0')
              : 'PIX expirado. Feche e tente novamente.';
          if (remaining === 0) { clearInterval(pixExpireTimer); stopPixPolling(); }
        }, 1000);
      }

      // Mostrar modal
      document.getElementById('pixOverlay').classList.add('open');

      // Iniciar polling
      startPixPolling();
    }

    function closePixModal() {
      document.getElementById('pixOverlay').classList.remove('open');
      stopPixPolling();
      if (pixExpireTimer) { clearInterval(pixExpireTimer); pixExpireTimer = null; }
      pixPaymentId = null;
    }

    function startPixPolling() {
      if (pixPollTimer) return;
      pixPollTimer = setInterval(checkPixStatus, 3000);
    }

    function stopPixPolling() {
      if (pixPollTimer) { clearInterval(pixPollTimer); pixPollTimer = null; }
    }

    async function checkPixStatus() {
      if (!pixPaymentId) return;
      try {
        var res = await fetch('/api/checkout/status?payment_id=' + encodeURIComponent(pixPaymentId));
        var data = await res.json();

        if (data.status === 'approved') {
          stopPixPolling();
          onPixApproved(data);
        } else if (data.status === 'rejected' || data.status === 'cancelled') {
          stopPixPolling();
          document.getElementById('pixStatusText').textContent = 'Pagamento ' + data.status + '. Tente novamente.';
        }
      } catch(_) {/* ignora erro de rede, tenta de novo no próximo tick */}
    }

    function onPixApproved(data) {
      var statusEl = document.getElementById('pixStatus');
      statusEl.classList.add('approved');
      document.getElementById('pixStatusText').textContent = 'Pagamento aprovado!';
      document.getElementById('pixSuccessMsg').style.display = 'block';
      document.querySelector('.pix-code-wrap').style.display = 'none';

      // Aguarda 2s e libera o download da imagem em alta resolução
      setTimeout(function() {
        closePixModal();
        downloadFinal();
      }, 2000);
    }

    function copyPixCode() {
      var code = document.getElementById('pixCodeText').textContent;
      navigator.clipboard.writeText(code).then(function() {
        var btn = document.getElementById('pixCopyBtn');
        btn.textContent = 'Copiado!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function downloadFinal() {
      // Baixa o canvas sem marca d'água (versão final paga)
      var canvas = document.getElementById('cardCanvas');
      var link = document.createElement('a');
      link.download = 'figurinha-figuri.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadPreview() {
      var canvas = document.getElementById('cardCanvas');
      var link = document.createElement('a');
      link.download = 'figurinha-preview.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
