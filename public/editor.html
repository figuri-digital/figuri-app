<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIGURI IA — Editor de Figurinha</title>
  <link rel="icon" type="image/svg+xml" href="/fav.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #F5C518;
    }
    .subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .editor-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      max-width: 1100px;
      width: 100%;
    }

    /* === CARD PREVIEW === */
    .card-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .arrow-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .arrow-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #F5C518;
      color: #F5C518;
    }

    .card-wrapper {
      position: relative;
      width: 380px;
      aspect-ratio: 3/4;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .card-wrapper canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Moldura color indicator */
    .moldura-indicator {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .moldura-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .moldura-dot.active {
      border-color: #F5C518;
      transform: scale(1.2);
      box-shadow: 0 0 8px rgba(245,197,24,0.5);
    }
    /* Moldura dot colors set dynamically via JS */
    #molduraDots { display: flex; gap: 8px; justify-content: center; }

    /* === CONTROLS === */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control-group {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
    }

    .control-group h3 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: #F5C518;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .field {
      margin-bottom: 14px;
    }
    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: #F5C518;
    }
    .field input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* Moldura selector */
    .moldura-options {
      display: flex;
      gap: 10px;
    }
    .moldura-option {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .moldura-option.active {
      border-color: #F5C518;
      background: rgba(245,197,24,0.1);
    }
    .moldura-option:hover {
      border-color: rgba(255,255,255,0.3);
    }
    /* Moldura option colors set dynamically via JS */

    /* Seletor de produto */
    .product-selector { margin-bottom: 12px; }
    .product-selector label { font-size: 0.78rem; color: #999; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .product-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .product-opt {
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      background: rgba(255,255,255,0.03);
    }
    .product-opt:hover { border-color: #94DD2D; background: rgba(148,221,45,0.07); }
    .product-opt.selected { border-color: #94DD2D; background: rgba(148,221,45,0.13); }
    .product-opt .opt-name { font-size: 0.78rem; font-weight: 600; color: #eee; }
    .product-opt .opt-price { font-size: 0.9rem; font-weight: 800; color: #94DD2D; margin-top: 2px; }

    .btn-comprar {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #94DD2D, #6ab520);
      border: none;
      border-radius: 10px;
      color: #1a2b01;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-comprar:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(148,221,45,0.4); }
    .btn-comprar:disabled { opacity: 0.6; cursor: default; transform: none; }

    /* Navbar */
    .editor-navbar {
      position: sticky; top: 0; z-index: 300;
      background: rgba(15,26,3,0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148,221,45,0.14);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 58px;
      width: 100%;
    }
    .editor-navbar .nav-back {
      background: none; border: 1px solid rgba(255,255,255,0.18);
      color: #ccc; padding: 7px 14px; border-radius: 8px;
      cursor: pointer; font-family: 'Sora', sans-serif; font-size: 13px;
      transition: all .18s; white-space: nowrap;
    }
    .editor-navbar .nav-back:hover { border-color: #94DD2D; color: #94DD2D; }
    .editor-navbar .nav-title {
      font-size: 1rem; font-weight: 800; color: #94DD2D;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .cart-nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(148,221,45,0.1);
      border: 1.5px solid rgba(148,221,45,0.35);
      color: #edfbd9; border-radius: 10px;
      padding: 7px 14px; cursor: pointer;
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 700;
      transition: all .18s; text-decoration: none;
    }
    .cart-nav-btn:hover { background: rgba(148,221,45,0.2); border-color: #94DD2D; }
    .cart-nav-btn.hidden { display: none; }
    .cart-nav-badge {
      background: #94DD2D; color: #1a2b01;
      border-radius: 50%; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
    }
    .cart-nav-total { color: #FFC300; font-weight: 800; }

    /* Botão flutuante carrinho */
    .cart-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 500;
      background: #94DD2D; color: #1a2b01;
      border: none; border-radius: 50px;
      padding: 14px 22px; font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .cart-fab:hover { background: #a8f033; transform: translateY(-2px); }
    .cart-fab .cart-count {
      background: #1a2b01; color: #94DD2D; border-radius: 50%;
      width: 22px; height: 22px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 800;
    }
    .cart-fab.hidden { display: none; }

    .btn-download {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #999;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-download:hover {
      border-color: #fff;
      color: #fff;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .editor-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 16px;
      }
      .card-wrapper { width: min(300px, 90vw); }
      .controls { width: 100%; }
    }

    @media (max-width: 600px) {
      .card-wrapper { width: min(280px, 88vw); }
      .editor-container { gap: 16px; padding: 12px; }
      .control-group { padding: 16px; }
    }

    @media (max-width: 480px) {
      .card-wrapper { width: min(260px, 92vw); }
      .editor-container { gap: 12px; padding: 10px 8px; }
      .control-group { padding: 12px; }
      .field { margin-bottom: 10px; }
      .arrow-btn { width: 48px; height: 48px; }
      .moldura-options { gap: 6px; flex-wrap: wrap; }
      .btn-comprar { padding: 18px; font-size: 1rem; }
    }
    /* ────────────────────────────────────────
       MODAL PIX
    ──────────────────────────────────────── */
    .pix-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .pix-overlay.open { display: flex; }

    .pix-modal {
      background: #111;
      border: 1px solid #2a5a00;
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 420px;
      width: 94vw;
      text-align: center;
      position: relative;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }

    .pix-modal .close-btn {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: #888; font-size: 22px; cursor: pointer;
    }
    .pix-modal .close-btn:hover { color: #fff; }

    .pix-modal h2 { font-size: 1.3rem; color: #94DD2D; margin-bottom: 4px; }
    .pix-modal .pix-amount { font-size: 2rem; font-weight: 800; color: #FFC300; margin: 8px 0 18px; }
    .pix-modal .pix-label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }

    .pix-qr-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      width: 180px; height: 180px;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .pix-qr-wrap img { width: 160px; height: 160px; display: block; }

    .pix-code-wrap {
      background: #1a2b01;
      border: 1px solid #2e4a05;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .pix-code-wrap code {
      font-size: 0.65rem;
      color: #94DD2D;
      word-break: break-all;
      flex: 1;
      text-align: left;
      font-family: monospace;
      line-height: 1.4;
    }
    .pix-copy-btn {
      flex-shrink: 0;
      background: #94DD2D;
      color: #1a2b01;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .pix-copy-btn.copied { background: #FFC300; }
    .pix-copy-btn:hover { background: #a8f033; }

    .pix-status {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.85rem; color: #aaa; margin-bottom: 10px;
    }
    .pix-status .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #FFC300;
      animation: pulse 1.2s infinite;
    }
    .pix-status.approved .dot { background: #94DD2D; animation: none; }
    .pix-status.approved { color: #94DD2D; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    .pix-timer { font-size: 0.75rem; color: #666; margin-top: 6px; }
    .pix-success-msg {
      display: none; padding: 16px;
      background: rgba(148,221,45,0.12);
      border: 1px solid #94DD2D;
      border-radius: 12px;
      color: #94DD2D;
      font-size: 0.95rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <!-- ██████████  MODAL PIX  ██████████ -->
  <div class="pix-overlay" id="pixOverlay">
    <div class="pix-modal">
      <button class="close-btn" onclick="closePixModal()" title="Fechar">✕</button>

      <h2>Pague com PIX 🟢</h2>
      <div class="pix-amount" id="pixAmount">R$ 19,90</div>
      <p class="pix-label">Escaneie o QR Code ou copie o código abaixo:</p>

      <div class="pix-qr-wrap">
        <img id="pixQrImg" src="" alt="QR Code PIX" />
      </div>

      <div class="pix-code-wrap">
        <code id="pixCodeText"></code>
        <button class="pix-copy-btn" id="pixCopyBtn" onclick="copyPixCode()">Copiar</button>
      </div>

      <div class="pix-status" id="pixStatus">
        <span class="dot"></span>
        <span id="pixStatusText">Aguardando pagamento...</span>
      </div>
      <div class="pix-timer" id="pixTimer"></div>

      <div class="pix-success-msg" id="pixSuccessMsg">
        ✅ Pagamento confirmado! Preparando sua figurinha...
      </div>
    </div>
  </div>
  <!-- NAVBAR -->
  <nav class="editor-navbar">
    <button class="nav-back" onclick="goBackToChoose()">← Voltar</button>
    <span class="nav-title">Editor de Figurinha</span>
    <a class="cart-nav-btn hidden" id="cartNavBtn" href="/carrinho.html">
      🛒 <span class="cart-nav-badge" id="cartNavCount">0</span>
      <span class="cart-nav-total" id="cartNavTotal">R$0</span>
      <span style="color:#aaa;font-weight:400">· Finalizar</span>
    </a>
  </nav>

  <div class="editor-container">
    <!-- Left: Card Preview with Arrows -->
    <div>
      <div class="card-area">
        <button class="arrow-btn" onclick="prevMoldura()">&#8249;</button>
        <div class="card-wrapper">
          <canvas id="cardCanvas" width="1543" height="2047"></canvas>
        </div>
        <button class="arrow-btn" onclick="nextMoldura()">&#8250;</button>
      </div>
      <div class="moldura-indicator">
        <div id="molduraDots"></div>
      </div>
      <div class="moldura-options" id="molduraButtons"></div>
    </div>

    <!-- Right: Controls -->
    <div class="controls">
      <!-- Text Fields -->
      <div class="control-group">
        <h3>Detalhes do Jogador</h3>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="playerName" value="" placeholder="Ex: SEU NOME" maxlength="20" oninput="renderCard()" />
        </div>
        <div class="field">
          <label>Data de Nascimento</label>
          <input type="text" id="playerBirth" value="" placeholder="Ex: 15/03/1995" maxlength="10" oninput="formatBirth(this); renderCard()" />
        </div>
        <div class="field" id="alturaGroup">
          <label>Altura</label>
          <input type="text" id="playerHeight" value="" placeholder="Ex: 1,75" maxlength="4" oninput="formatHeight(this); renderCard()" />
        </div>
      </div>

      <!-- Seletor de produto -->
      <div class="product-selector">
        <label>Escolha o produto</label>
        <div class="product-options" id="productOptions">
          <div class="product-opt selected" data-type="digital" data-price="1990" onclick="selectProduct(this)">
            <div class="opt-name">📱 Digital</div>
            <div class="opt-price">R$19,90</div>
          </div>
          <div class="product-opt" data-type="fisica" data-price="2490" onclick="selectProduct(this)">
            <div class="opt-name">📦 Física</div>
            <div class="opt-price">R$24,90</div>
          </div>
          <div class="product-opt" data-type="moldura" data-price="4990" onclick="selectProduct(this)">
            <div class="opt-name">🖼 Com Moldura</div>
            <div class="opt-price">R$49,90</div>
          </div>
          <div class="product-opt" data-type="pack" data-price="6990" onclick="selectProduct(this)">
            <div class="opt-name">🎴 Pack</div>
            <div class="opt-price">R$69,90</div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <button class="btn-comprar" id="btnAddCart" onclick="addToCart()">🛒 Adicionar ao Carrinho</button>
      <button class="btn-download" onclick="downloadPreview()">Baixar Preview (com marca d'agua)</button>
    </div>
  </div>

  <!-- Botão flutuante carrinho -->
  <button class="cart-fab hidden" id="cartFab" onclick="goToCart()">
    🛒 Ver Carrinho <span class="cart-count" id="cartFabCount">0</span>
  </button>

  <script>
    // ── BACK TO CHOOSE ──
    function goBackToChoose() {
      var savedImageId = new URLSearchParams(window.location.search).get('imageId') || '';
      window.location.href = 'gerar.html?restore=true&imageId=' + encodeURIComponent(savedImageId);
    }

    // ── CONFIG ──
    var CANVAS_W = 1543;
    var CANVAS_H = 2047;

    // Auto-format birth date: inserts / after DD and MM
    function formatBirth(input) {
      var v = input.value.replace(/\D/g, '').slice(0, 8);
      if (v.length >= 5) {
        input.value = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
      } else if (v.length >= 3) {
        input.value = v.slice(0, 2) + '/' + v.slice(2);
      } else {
        input.value = v;
      }
    }

    // Auto-format height: inserts , after first digit
    function formatHeight(input) {
      var v = input.value.replace(/\D/g, '').slice(0, 3);
      if (v.length >= 2) {
        input.value = v.slice(0, 1) + ',' + v.slice(1);
      } else {
        input.value = v;
      }
    }

    // ── READ URL PARAMS ──
    var editorParams = new URLSearchParams(window.location.search);
    var paramImageUrl = editorParams.get('imageUrl') || '';
    var paramHiresUrl = editorParams.get('hiresUrl') || '';
    var paramImageId = editorParams.get('imageId') || '';
    var paramCountry = editorParams.get('country') || 'brasil';
    var paramType = editorParams.get('type') || 'jogador'; // jogador | pet | familia
    var paramTextColors = (function() {
      try { return JSON.parse(editorParams.get('textColors') || '{}'); } catch(_) { return {}; }
    })();
    var legacyColor = editorParams.get('textColor') || '#FFFFFF';

    // Returns color for a specific moldura + field (name|birth|height)
    // Supports new {name,birth,height} per-moldura structure and legacy string
    function getFieldColor(moldura, field) {
      var m = paramTextColors[moldura];
      if (!m) return legacyColor;
      if (typeof m === 'string') return m;
      return m[field] || legacyColor;
    }

    var isPetOrCasal = (paramType === 'pet' || paramType === 'familia');

    // Hide Altura field for pet and casal
    if (isPetOrCasal) {
      var alturaGroup = document.getElementById('alturaGroup');
      if (alturaGroup) alturaGroup.style.display = 'none';
    }

    // Country moldura config — how many molduras each country has
    var COUNTRY_MOLDURAS = {
      brasil: 4, argentina: 4, colombia: 4, uruguai: 4,
      franca: 4, alemanha: 4, portugal: 4, espanha: 4,
    };

    var numMolduras = COUNTRY_MOLDURAS[paramCountry] || 4;
    var MOLDURAS = [];
    for (var i = 1; i <= numMolduras; i++) {
      MOLDURAS.push(String(i).padStart(2, '0'));
    }
    var currentMolduraIndex = 0;

    // Text positions (based on 1543x2047 canvas)
    var TEXT_CONFIG = {
      name:   { x: 240, y: 1750, font: '700 72px Sora', color: getFieldColor('01', 'name') },
      height: { x: 320, y: 1870, font: '400 48px Sora', color: getFieldColor('01', 'height') },
      birth:  { x: 570, y: 1870, font: '400 48px Sora', color: getFieldColor('01', 'birth') },
    };

    function updateTextConfigColor(moldura) {
      TEXT_CONFIG.name.color   = getFieldColor(moldura, 'name');
      TEXT_CONFIG.height.color = getFieldColor(moldura, 'height');
      TEXT_CONFIG.birth.color  = getFieldColor(moldura, 'birth');
    }

    // ── IMAGE CACHE ──
    var layoutImg = new Image();
    var molduraImgs = {};
    var imagesLoaded = 0;
    var totalImages = 1 + numMolduras;

    function onImageLoad() {
      imagesLoaded++;
      if (imagesLoaded >= totalImages) {
        renderCard();
      }
    }

    // Load layout (use generated image from URL params if available)
    layoutImg.crossOrigin = 'anonymous';
    layoutImg.onload = onImageLoad;
    layoutImg.src = paramImageUrl || '/assets/layouts/' + paramCountry + '.png';

    // Load molduras dynamically based on country and type
    MOLDURAS.forEach(function(m) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = onImageLoad;
      var molduraPath = isPetOrCasal
        ? '/assets/molduras/' + paramCountry + '/pet-casal/' + m + '-pet-casal.png'
        : '/assets/molduras/' + paramCountry + '/' + m + '-sozinho.png';
      img.src = molduraPath;
      molduraImgs[m] = img;
    });

    // ── RENDER ──
    function renderCard() {
      var canvas = document.getElementById('cardCanvas');
      var ctx = canvas.getContext('2d');

      // Clear
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      // 1. Draw layout (jogador) — fit to canvas
      if (layoutImg.complete && layoutImg.naturalWidth) {
        // Calculate scaling to fit layout into canvas
        var scale = Math.max(CANVAS_W / layoutImg.naturalWidth, CANVAS_H / layoutImg.naturalHeight);
        var sw = layoutImg.naturalWidth * scale;
        var sh = layoutImg.naturalHeight * scale;
        var sx = (CANVAS_W - sw) / 2;
        var sy = (CANVAS_H - sh) / 2;
        ctx.drawImage(layoutImg, sx, sy, sw, sh);
      }

      // 2. Draw moldura overlay
      var currentMoldura = MOLDURAS[currentMolduraIndex];
      var molduraImg = molduraImgs[currentMoldura];
      if (molduraImg && molduraImg.complete && molduraImg.naturalWidth) {
        ctx.drawImage(molduraImg, 0, 0, CANVAS_W, CANVAS_H);
      }

      // 3. Draw texts
      var name = (document.getElementById('playerName').value || '').toUpperCase();
      var birth = (document.getElementById('playerBirth').value || '').toUpperCase();
      var height = (document.getElementById('playerHeight').value || '').toUpperCase();

      // Format birth: replace / with -
      birth = birth.replace(/\//g, '-');

      // Name — bold, centered
      ctx.font = TEXT_CONFIG.name.font;
      ctx.fillStyle = TEXT_CONFIG.name.color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      // Add text shadow for readability
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      ctx.fillText(name, TEXT_CONFIG.name.x, TEXT_CONFIG.name.y);

      // Height — only for sozinho
      if (!isPetOrCasal) {
        ctx.font = TEXT_CONFIG.height.font;
        ctx.fillText(height, TEXT_CONFIG.height.x, TEXT_CONFIG.height.y);
      }

      // Birth — regular, centered at its position
      ctx.font = TEXT_CONFIG.birth.font;
      ctx.fillText(birth, TEXT_CONFIG.birth.x, TEXT_CONFIG.birth.y);

      // Reset shadow
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    // ── MOLDURA CONTROLS ──
    // ── BUILD MOLDURA UI DYNAMICALLY ──
    var dotsContainer = document.getElementById('molduraDots');
    var btnsContainer = document.getElementById('molduraButtons');
    // Colors per country — index matches moldura 01, 02, 03, 04
    var COUNTRY_COLORS = {
      brasil:    ['#ffffff', '#1B8C3D', '#1E3A8A', '#F5C518'],
      argentina: ['#ffffff', '#74ACDF', '#1A3A6E', '#F6C517'],
      colombia:  ['#ffffff', '#FCD116', '#003087', '#CE1126'],
      uruguai:   ['#ffffff', '#5B9FFF', '#003DA5', '#FFFFFF'],
      franca:    ['#ffffff', '#002395', '#ED2939', '#FFFFFF'],
      alemanha:  ['#ffffff'],
      portugal:  ['#ffffff'],
      espanha:   ['#ffffff'],
    };
    var molduraColors = COUNTRY_COLORS[paramCountry] || ['#ffffff', '#888', '#555', '#333'];

    MOLDURAS.forEach(function(m, idx) {
      // Dot
      var dot = document.createElement('div');
      dot.className = 'moldura-dot' + (idx === 0 ? ' active' : '');
      dot.style.background = molduraColors[idx] || '#888';
      dot.dataset.color = m;
      dot.onclick = function() { setMoldura(m); };
      dotsContainer.appendChild(dot);

      // Button
      var btn = document.createElement('div');
      btn.className = 'moldura-option' + (idx === 0 ? ' active' : '');
      btn.dataset.m = m;
      btn.textContent = 'Moldura ' + (idx + 1);
      btn.onclick = function() { setMoldura(m); };
      btnsContainer.appendChild(btn);
    });

    function setMoldura(name) {
      currentMolduraIndex = MOLDURAS.indexOf(name);
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function nextMoldura() {
      currentMolduraIndex = (currentMolduraIndex + 1) % MOLDURAS.length;
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function prevMoldura() {
      currentMolduraIndex = (currentMolduraIndex - 1 + MOLDURAS.length) % MOLDURAS.length;
      updateTextConfigColor(MOLDURAS[currentMolduraIndex]);
      updateMolduraUI();
      renderCard();
    }

    function updateMolduraUI() {
      var current = MOLDURAS[currentMolduraIndex];

      // Update dots
      document.querySelectorAll('.moldura-dot').forEach(function(dot) {
        dot.classList.toggle('active', dot.dataset.color === current);
      });

      // Update options
      document.querySelectorAll('.moldura-option').forEach(function(opt) {
        opt.classList.toggle('active', opt.dataset.m === current);
      });
    }

    // ── CARRINHO ─────────────────────────────────────────────────────────────

    var CART_KEY = 'figuri_cart';

    var PRODUCTS_MAP = {
      digital: { label: 'Figurinha Digital',             price: 1990 },
      fisica:  { label: 'Figurinha Física',              price: 2490 },
      moldura: { label: 'Figurinha com Moldura Premium', price: 4990 },
      pack:    { label: 'Pack de Figurinhas',             price: 6990 },
    };

    var selectedProductType = 'digital';

    function selectProduct(el) {
      document.querySelectorAll('.product-opt').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
      selectedProductType = el.dataset.type;
    }

    function getCart() {
      try { return JSON.parse(localStorage.getItem(CART_KEY) || '{"items":[]}'); } catch(_) { return { items: [] }; }
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartUI();
    }

    function updateCartUI() {
      var cart  = getCart();
      var items = cart.items || [];
      var n     = items.length;
      var total = items.reduce(function(s, i) { return s + (i.price || 0); }, 0);
      var fmt   = 'R$' + (total / 100).toFixed(2).replace('.', ',');

      // FAB
      var fab = document.getElementById('cartFab');
      var fabCount = document.getElementById('cartFabCount');
      if (n > 0) { fab.classList.remove('hidden'); fabCount.textContent = n; }
      else { fab.classList.add('hidden'); }

      // Navbar
      var navBtn   = document.getElementById('cartNavBtn');
      var navCount = document.getElementById('cartNavCount');
      var navTotal = document.getElementById('cartNavTotal');
      if (n > 0) {
        navBtn.classList.remove('hidden');
        navCount.textContent = n;
        navTotal.textContent = fmt;
      } else {
        navBtn.classList.add('hidden');
      }
    }

    function addToCart() {
      try {
        var product = PRODUCTS_MAP[selectedProductType];
        if (!product) { alert('Selecione um produto antes de adicionar.'); return; }

        var canvas = document.getElementById('cardCanvas');
        var thumbnail = '';
        try { thumbnail = canvas.toDataURL('image/jpeg', 0.6); } catch(_) { thumbnail = paramImageUrl || ''; }

        var cart = getCart();
        cart.items.push({
          id:             Date.now() + '-' + Math.random().toString(36).slice(2, 7),
          imageId:        paramImageId,
          variationIndex: parseInt(editorParams.get('varIndex') || '0', 10),
          imageUrl:       paramImageUrl,
          hiresUrl:       paramHiresUrl,
          thumbnail:      thumbnail,
          productType:    selectedProductType,
          productLabel:   product.label,
          price:          product.price,
          country:        paramCountry,
          type:           paramType,
          playerName:     document.getElementById('playerName').value,
          playerBirth:    document.getElementById('playerBirth').value,
          playerHeight:   document.getElementById('playerHeight').value,
          moldura:        MOLDURAS[currentMolduraIndex],
        });
        saveCart(cart);
        updateCartUI();

        // Feedback visual no botão
        var btn = document.getElementById('btnAddCart');
        btn.textContent = '✅ Adicionado!';
        btn.style.background = 'linear-gradient(135deg,#FFC300,#e6b000)';
        setTimeout(function() {
          btn.textContent = '🛒 Adicionar ao Carrinho';
          btn.style.background = '';
        }, 1800);

      } catch(err) {
        console.error('addToCart error:', err);
        alert('Erro ao adicionar: ' + err.message);
      }
    }

    function goToCart() { window.location.href = '/carrinho.html'; }

    // Inicializa UI do carrinho ao carregar
    updateCartUI();

    function downloadPreview() {
      var canvas = document.getElementById('cardCanvas');
      var link = document.createElement('a');
      link.download = 'figurinha-preview.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
